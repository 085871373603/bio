<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Evaluasi Kognitif</title>
    
    <!-- Tipografi & Library -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
            --card-bg: #ffffff;
            --text-main: #334155;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --border-color: #e2e8f0;
            --danger: #ef4444;
            --success: #10b981;
        }

        body {
            -webkit-user-select: none; user-select: none;
            font-family: 'Poppins', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%; max-width: 750px; background: var(--card-bg);
            border-radius: 20px; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            display: flex; flex-direction: column; max-height: 90vh;
            overflow: hidden; margin: 20px; position: relative;
        }

        .header-bar {
            background: #fff; padding: 15px 30px;
            border-bottom: 1px solid var(--border-color);
            display: flex; align-items: center; justify-content: space-between;
        }

        .header-logo { height: 60px; object-fit: contain; }
        .content-area { padding: 30px; overflow-y: auto; flex-grow: 1; }
        
        .promo-banner {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            color: white; padding: 18px 24px; border-radius: 14px; margin-bottom: 25px;
            display: flex; align-items: center; gap: 15px;
        }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; font-size: 14px; }
        .form-group input:not([type="checkbox"]) {
            width: 100%; padding: 12px 16px; border: 2px solid #e2e8f0;
            border-radius: 12px; font-size: 15px; outline: none;
        }

        button {
            background: var(--primary); color: white; border: none; border-radius: 12px;
            padding: 14px 28px; cursor: pointer; font-weight: 600; width: 100%;
        }

        .hidden { display: none !important; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body oncontextmenu="return false;" oncopy="return false;" oncut="return false;" onpaste="return false;">

    <div class="app-container">
        <div class="header-bar">
            <img src="arinexfoundation.png" alt="Logo" class="header-logo">
            <span style="color: #64748b; font-size: 13px; font-weight: 500;">Evaluasi Kognitif</span>
        </div>
        
        <div class="content-area">
            <div id="splash-screen"><img id="splash-img" src="arinexfoundation.png" alt="Logo"></div>

            <div id="registration-screen" class="hidden fade-in">
                <div class="promo-banner"><div>🎁</div><div class="promo-text"><strong>Undian Spesial!</strong><p>Menangkan voucher belanja Rp 25.000 untuk 100 pemenang.</p></div></div>
                <h2>Selamat Datang!</h2>
                <div class="form-group"><label>Nama Lengkap</label><input type="text" id="userName" required></div>
                <div class="form-group"><label>Usia</label><input type="number" id="userAge" required></div>
                <div class="form-group"><label>Email</label><input type="email" id="userEmail" required></div>
                <label class="checkbox-container"><input type="checkbox" id="agreeTerms" required> Saya menyetujui S&K.</label>
                <button onclick="startTest()">Mulai Tes</button>
            </div>

            <div id="test-screen" class="hidden fade-in">
                <div id="questions-container"></div>
                <button id="btn-submit" onclick="submitTest()" style="background: var(--success);">Kirim Jawaban</button>
            </div>

            <div id="result-screen" class="hidden fade-in">
                <div style="text-align: center;"><h2>Evaluasi Selesai!</h2><p id="thank-you-msg"></p></div>
                <button id="btn-download" onclick="downloadResultPDF()" style="margin-top:20px;">Unduh Hasil Tes (PDF HD)</button>
            </div>

            <div id="blocked-screen" class="hidden fade-in"><h2>Akses Ditolak</h2><p>Tes sudah diselesaikan.</p></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
        import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAxf2w0makvkXAD1zBMSJyV4ZD0f05FvDc",
            authDomain: "profil-db4e9.firebaseapp.com",
            databaseURL: "https://profil-db4e9-default-rtdb.firebaseio.com",
            projectId: "profil-db4e9",
            storageBucket: "profil-db4e9.firebasestorage.app",
            messagingSenderId: "897423797460",
            appId: "1:897423797460:web:88b1ef8537397c023d1f41",
            measurementId: "G-G1Y4QE8J06"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        window.saveToFirebase = (data) => push(ref(database, 'hasil_tes'), data);
    </script>

    <script>
        // Data Soal (Disederhanakan untuk contoh)
        const questions = [{ id: 1, type: "PU", text: "Siapa Bapak Proklamator Indonesia?", options: { A: "Soekarno", B: "Hatta" }, correct: "A" }];
        let userData = { name: "", age: "", email: "", score: 0, token: "" };

        function startTest() {
            userData.name = document.getElementById("userName").value;
            if(!userData.name) return alert("Isi data!");
            document.getElementById("registration-screen").classList.add("hidden");
            document.getElementById("test-screen").classList.remove("hidden");
        }

        function submitTest() {
            userData.token = "ARNX-" + new Date().getTime() + "-" + Math.random().toString(36).substring(2, 8).toUpperCase();
            
            if (window.saveToFirebase) {
                window.saveToFirebase({
                    nama: userData.name, email: userData.email,
                    token_dokumen: userData.token,
                    waktu_selesai: new Date().toISOString()
                });
            }
            
            localStorage.setItem("arinex_test_completed", "true");
            document.getElementById("test-screen").classList.add("hidden");
            document.getElementById("result-screen").classList.remove("hidden");
        }

        function downloadResultPDF() {
            const canvas = document.createElement("canvas");
            canvas.width = 3000; canvas.height = 2100;
            const ctx = canvas.getContext("2d");
            
            // Background
            ctx.fillStyle = "#ffffff"; ctx.fillRect(0,0,3000,2100);
            ctx.fillStyle = "#1e293b"; ctx.fillRect(0, 0, 3000, 300);
            
            // Teks
            ctx.fillStyle = "#ffffff"; ctx.font = "bold 80px Poppins";
            ctx.fillText("LAPORAN HASIL EVALUASI", 1500, 180);
            
            // QR Code
            const qr = new QRious({
                value: window.location.origin + "/sign.html?token=" + userData.token,
                size: 500
            });
            const img = new Image();
            img.onload = () => {
                ctx.drawImage(img, 2400, 1500, 500, 500);
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF('l', 'px', [1000, 700]);
                pdf.addImage(canvas.toDataURL("image/png"), 'PNG', 0, 0, 1000, 700);
                pdf.save("Sertifikat_" + userData.name + ".pdf");
            };
            img.src = qr.toDataURL();
        }
    </script>
</body>
</html>
